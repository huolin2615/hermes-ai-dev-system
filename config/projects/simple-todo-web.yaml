schema_version: 2
id: simple-todo-web

repo:
  path: /Users/huolin/Documents/知识库搭建/demo/simple-todo-web
  base_branch: main
  require_clean: true

hermes:
  board: simple-todo-web
  assignee: ai-dev

codex:
  network: false
  reasoning_effort: high
  turn_timeout_seconds: 1800

review:
  model: sonnet
  max_fix_cycles: 2
  max_turns: 8

budgets:
  max_active_minutes: 60
  max_codex_input_tokens: 5000000
  max_codex_output_tokens: 50000
  warning_ratio: 0.8

retention:
  task_artifacts_days: 30
  warn_before_days: 7

verification:
  commands:
    - id: tests
      argv: [node, --test]
      required: true
      timeout_seconds: 120
    - id: app-syntax
      argv: [node, --check, src/app.js]
      required: true
      timeout_seconds: 30

knowledge:
  vault_path: /Users/huolin/Documents/Obsidian Vault
  project_path: AI Dev/Projects/simple-todo-web
  task_logs: auto
  reusable_knowledge: ask

ci:
  mode: local
